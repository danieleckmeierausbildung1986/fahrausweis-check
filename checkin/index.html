
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schulungs-Check-in</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1b2a;
      color: #e8edf2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #162032;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #7a94b0;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7a94b0;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #0d1b2a;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 16px;
      color: #e8edf2;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    input:focus {
      border-color: #c9a84c;
    }

    input::placeholder {
      color: #3a5572;
    }

    button {
      width: 100%;
      background: #c9a84c;
      border: none;
      border-radius: 8px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      color: #0d1b2a;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) { background: #dbb95a; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { background: #3a5572; color: #7a94b0; cursor: not-allowed; }

    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      line-height: 1.5;
    }

    .status.success {
      background: #0a2e1a;
      border: 1px solid #1a6b3a;
      color: #4cd98a;
      display: block;
    }

    .status.error {
      background: #2e0a0a;
      border: 1px solid #6b1a1a;
      color: #d94c4c;
      display: block;
    }

    .status.loading {
      background: #0d1b2a;
      border: 1px solid #1e3a5f;
      color: #7a94b0;
      display: block;
    }

    .name-display {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      margin-top: 4px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #3a5572;
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">DGUV 308-001 · Ausbildung</div>
    <h1>Schulungs-Check-in</h1>
    <p class="subtitle">Bitte Registrierungsnummer eingeben zur Anwesenheitserfassung.</p>

    <label for="regnr">Registrierungsnummer</label>
    <input
      type="text"
      id="regnr"
      placeholder="z. B. 2026-001"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />

    <button id="btnCheckin" onclick="doCheckin()">Einchecken</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const FLOW_URL = "https://default8af25f9034bc4ef4aba22ab6f641d5.01.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/700a9a9011d74232b5e0ca42997723aa/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=EWlMM-zKm8M48s9AYQK0JMP6mcrWDE9QhbG4WYaLCRM";

    async function doCheckin() {
      const regnr = document.getElementById('regnr').value.trim();
      const btn = document.getElementById('btnCheckin');
      const status = document.getElementById('status');

      if (!regnr) {
        showStatus('error', 'Bitte Registrierungsnummer eingeben.');
        return;
      }

      btn.disabled = true;
      showStatus('loading', '<span class="spinner"></span>Wird erfasst…');

      try {
        const response = await fetch(FLOW_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ registrierungsnummer: regnr })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          showStatus('success',
            `✓ Anwesenheit erfasst<br>
            <span class="name-display">${data.vorname} ${data.name}</span>
            <br>Kurs: ${data.kursnummer} · ${data.schulungstyp}`
          );
          document.getElementById('regnr').value = '';
        } else if (data.error === 'not_found') {
          showStatus('error', 'Registrierungsnummer nicht gefunden. Bitte prüfen.');
          btn.disabled = false;
        } else {
          showStatus('error', 'Fehler beim Check-in. Bitte erneut versuchen.');
          btn.disabled = false;
        }
      } catch (e) {
        showStatus('error', 'Verbindungsfehler. Bitte erneut versuchen.');
        btn.disabled = false;
      }
    }

    function showStatus(type, message) {
      const status = document.getElementById('status');
      status.className = 'status ' + type;
      status.innerHTML = message;
    }

    document.getElementById('regnr').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doCheckin();
    });
  </script>
</body>
</html>

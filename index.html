<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrausweis-Verifikation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 16px; }
  .container { width: 100%; max-width: 480px; }
  .header { background: #1F4E79; color: white; border-radius: 8px 8px 0 0; padding: 16px 20px; text-align: center; }
  .header h1 { font-size: 14pt; font-weight: bold; letter-spacing: 0.5px; }
  .header p { font-size: 9pt; margin-top: 4px; opacity: 0.85; }
  .search-box { background: white; padding: 20px; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
  .search-box label { font-size: 9pt; color: #555; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 6px; }
  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 11pt; }
  .search-row input:focus { outline: none; border-color: #1F4E79; }
  .search-row button { background: #1F4E79; color: white; border: none; border-radius: 4px; padding: 10px 18px; font-size: 10pt; font-weight: bold; cursor: pointer; }
  .search-row button:hover { background: #163d61; }
  .result-box { background: white; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; padding: 20px; }
  .person-header { border-bottom: 1px solid #eee; padding-bottom: 12px; margin-bottom: 16px; }
  .person-name { font-size: 14pt; font-weight: bold; color: #1F4E79; }
  .person-regnr { font-size: 9pt; color: #888; margin-top: 2px; }
  .section-title { font-size: 8pt; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 8px; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: 4px; margin-bottom: 6px; background: #f9f9f9; border: 1px solid #eee; }
  .row-label { font-size: 9pt; color: #333; font-weight: bold; }
  .row-sub { font-size: 8pt; color: #888; margin-top: 2px; }
  .badge { font-size: 8pt; font-weight: bold; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
  .badge-ok { background: #d4edda; color: #1a6b34; }
  .badge-extern { background: #d0e8ff; color: #1F4E79; }
  .badge-warn { background: #fff3cd; color: #856404; }
  .badge-danger { background: #f8d7da; color: #721c24; }
  .badge-none { background: #e9ecef; color: #6c757d; }
  .loading { text-align: center; padding: 20px; color: #888; font-size: 10pt; }
  .error { text-align: center; padding: 20px; color: #c0392b; font-size: 10pt; }
  #result-box { display: none; }
  .footer { margin-top: 20px; font-size: 8pt; color: #aaa; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>FAHRAUSWEIS-VERIFIKATION</h1>
    <p>Ausbildungsnachweis für Flurförderzeuge</p>
  </div>
  <div class="search-box">
    <label>Registrierungsnummer</label>
    <div class="search-row">
      <input type="text" id="regnr-input" placeholder="z.B. 2026-075" />
      <button onclick="checkAusweis()">Prüfen</button>
    </div>
  </div>

  <div id="result-box" class="result-box">
    <div id="result-content"></div>
  </div>

  <div class="footer">DGUV Grundsatz 308-001 · VDI 2700</div>
</div>

<script>
const FLOW_URL = 'https://default8af25f9034bc4ef4aba22ab6f641d5.01.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/349e4e8b1d45432b817f42bcd294571f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=pLzuKj8NElFRsDTambfHKUsVmz76SVbjVv7kcXMEVo8';

async function checkAusweis() {
  const regnr = document.getElementById('regnr-input').value.trim();
  if (!regnr) return;

  const box = document.getElementById('result-box');
  const content = document.getElementById('result-content');
  box.style.display = 'block';
  content.innerHTML = '<div class="loading">Daten werden abgerufen...</div>';

  try {
    const resp = await fetch(FLOW_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ registrierungsnummer: regnr })
    });

    if (!resp.ok) throw new Error('Nicht gefunden');
    const d = await resp.json();

    if (!d || !d.name) {
      content.innerHTML = '<div class="error">Keine Daten gefunden für: <strong>' + regnr + '</strong></div>';
      return;
    }

    // Stufe 1 Status ermitteln
    const s1Bestanden = d.s1_praxis === 'Bestanden' && d.s1_theorie === 'Bestanden';
    const s1Extern = d.nachweis_stufe1 === 'ja';

    // Ablaufdatum LaSi berechnen
    let lasiAblaufBadge = 'badge-none';
    let lasiAblaufText = '';
    if (d.lasi_datum) {
      const parts = d.lasi_datum.split('.');
      const lasiDate = new Date(parts[2], parts[1]-1, parts[0]);
      const ablauf = new Date(lasiDate);
      ablauf.setFullYear(ablauf.getFullYear() + 2);
      const lasiAblauf = ablauf.toLocaleDateString('de-DE');
      const heute = new Date();
      if (ablauf < heute) {
        lasiAblaufBadge = 'badge-danger';
        lasiAblaufText = '\u26a0\ufe0f Abgelaufen';
      } else {
        const diffDays = Math.ceil((ablauf - heute) / (1000*60*60*24));
        if (diffDays <= 90) {
          lasiAblaufBadge = 'badge-warn';
          lasiAblaufText = '\u26a0\ufe0f l\u00e4uft bald ab';
        } else {
          lasiAblaufBadge = 'badge-ok';
          lasiAblaufText = 'g\u00fcltig bis ' + lasiAblauf;
        }
      }
    }

    function row(label, sub, badgeText, badgeClass) {
      return '<div class="row"><div><div class="row-label">' + label + '</div><div class="row-sub">' + sub + '</div></div><span class="badge ' + badgeClass + '">' + badgeText + '</span></div>';
    }

    // Stufe 1 Zeile
    let s1Row = '';
    if (s1Extern && !s1Bestanden) {
      s1Row = row('Stufe 1', 'Extern nachgewiesen', '\u2713 Extern', 'badge-extern');
    } else if (s1Bestanden) {
      s1Row = row('Stufe 1', 'Pr\u00fcfung am ' + (d.s1_datum ? d.s1_datum.split('-').reverse().join('.') : '\u2014'), '\u2713 Bestanden', 'badge-ok');
    } else {
      s1Row = row('Stufe 1', '\u2014', 'nicht absolviert', 'badge-none');
    }

    let html = '<div class="person-header"><div class="person-name">' + d.vorname + ' ' + d.name + '</div><div class="person-regnr">Reg.-Nr. ' + regnr + '</div></div>';
    html += '<div class="section-title">Stapler Stufe 1</div>' + s1Row;
    html += '<div class="section-title">Stapler Stufe 2</div>';
    html += (d.schubmast === 'Bestanden')
      ? row('Schubmast', 'Pr\u00fcfung am ' + (d.schubmast_datum || '\u2014'), '\u2713 Bestanden', 'badge-ok')
      : row('Schubmast', d.schubmast_gebucht === 'Ja' ? 'gebucht' : 'nicht absolviert', d.schubmast_gebucht === 'Ja' ? 'ausstehend' : '\u2014', d.schubmast_gebucht === 'Ja' ? 'badge-warn' : 'badge-none');
    html += (d.komm === 'Bestanden')
      ? row('Kommissionierer', 'Pr\u00fcfung am ' + (d.komm_datum || '\u2014'), '\u2713 Bestanden', 'badge-ok')
      : row('Kommissionierer', d.komm_gebucht === 'Ja' ? 'gebucht' : 'nicht absolviert', d.komm_gebucht === 'Ja' ? 'ausstehend' : '\u2014', d.komm_gebucht === 'Ja' ? 'badge-warn' : 'badge-none');
    html += (d.schmal === 'Bestanden')
      ? row('Schmalgang', 'Pr\u00fcfung am ' + (d.schmal_datum || '\u2014'), '\u2713 Bestanden', 'badge-ok')
      : row('Schmalgang', d.schmal_gebucht === 'Ja' ? 'gebucht' : 'nicht absolviert', d.schmal_gebucht === 'Ja' ? 'ausstehend' : '\u2014', d.schmal_gebucht === 'Ja' ? 'badge-warn' : 'badge-none');
    html += '<div class="section-title">Ladungssicherung VDI 2700</div>';
    html += (d.lasi_status === 'Bestanden')
      ? row('Ladungssicherung', 'Pr\u00fcfung am ' + (d.lasi_datum || '\u2014'), lasiAblaufText, lasiAblaufBadge)
      : row('Ladungssicherung', '\u2014', 'nicht absolviert', 'badge-none');

    content.innerHTML = html;

  } catch(e) {
    content.innerHTML = '<div class="error">Fehler beim Abrufen der Daten. Bitte erneut versuchen.</div>';
  }
}

window.onload = function() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) {
    document.getElementById('regnr-input').value = id;
    checkAusweis();
  }
};
</script>
</body>
</html>
